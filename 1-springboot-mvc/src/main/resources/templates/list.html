<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</head>
<body>

    <div class="alert alert-danger" th:if="${error != null}" th:text="${error}"></div>
    <div class="alert alert-success" th:if="${success != null}" th:text="${success}"></div>

    <div class="container my-4">
        <h3 th:text="${title}"></h3>

        <a th:href="@{/users/form}" th:text="'Crear user (+)'" class="btn btn-secondary"></a>
        <div th:text="'No hay usuarios en el sistema'" th:if="${#lists.isEmpty(users)}"></div>

        <table th:if="${not #lists.isEmpty(users)}" class="table table-hover table-striped">
            <thead>
            <tr>
                <th>Id</th>
                <th>Name</th>
                <th>LastName</th>
                <th>email</th>
                <th>Created At</th>
                <th>Edit</th>
                <th>Remove</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user: ${users}">
                <td th:text="${user.id}"></td>
                <td th:text="${user.name}"></td>
                <td th:text="${user.lastname}"></td>
                <td th:text="${user.email}"></td>
                <td th:text="${user.createdAt}"></td>
                <td><a th:href="@{/users/form/{id}(id=${user.id})}" class="btn btn-sm btn-primary">Edit</a></td>
                <td><a th:href="@{/users/delete/} + ${user.id}" class="btn btn-sm btn-danger" onclick="return confirm('Esta seguro que desea eliminar?')">Delete</a></td>
            </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
