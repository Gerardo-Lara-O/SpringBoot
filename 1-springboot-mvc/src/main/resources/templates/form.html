<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title th:title="${title}"></title>
</head>
<body>
    <div>
        <h4 th:text="${title}"></h4>
        <a th:href="@{/users}" th:text="'Volver'"></a>
        <form th:action="@{/users}" method="post" th:object="${user}">
            <input type="hidden" th:field="*{id}">
            <input type="hidden" th:field="*{createdAt}">
            <div>
                <label for="name">Nombre: </label>
                <div>
                    <input type="text" name="name" id="name" th:field="*{name}">
                </div>
            </div>

            <div>
                <label for="lastname">Apellidos: </label>
                <div>
                    <input type="text" name="lastname" id="lastname" th:field="*{lastname}">
                </div>
            </div>

            <div>
                <label for="email">Email: </label>
                <div>
                    <input type="text" id="email" th:field="*{email}">
                </div>
            </div>

            <div>
                <label for="username">Username: </label>
                <div>
                    <input type="text" id="username" th:field="*{username}">
                </div>
            </div>

            <div>
                <label for="password">Password</label>
                <div>
                    <input type="password" id="password" th:field="*{password}">
                </div>
            </div>

            <div>
                <div>
                    <input type="submit" th:value="${(user.id != null && user.id > 0) ? 'Editar' : 'Crear'}">
                </div>
            </div>

        </form>
    </div>
</body>
</html>
